<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}TRINIDAD.LOG{% endblock %}</title>
  <link rel="stylesheet" href="{{ static_root }}style.css">
</head>
<body>
  <div class="page-wrap">
    <nav class="nav">
      <a href="{{ root }}index.html" class="nav-logo">TRINIDAD MARTÍ — Backend Dev</a>
      <ul class="nav-links">
        <li><a href="{{ root }}index.html">Inicio</a></li>
        <li><a href="{{ static_root }}cv.pdf" id="cv-link">CV</a></li>
        <li><a href="{{ root }}about.html">About me</a></li>
        <li><a href="https://www.linkedin.com/in/trinidad-mart%C3%AD-guti%C3%A9rrez-a9b872244/" target="_blank" rel="noopener" aria-label="LinkedIn"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:block"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg></a></li>
      </ul>
    </nav>
    {% block content %}{% endblock %}
  </div>

  <div class="cv-modal-backdrop" id="cv-backdrop">
    <div class="cv-modal">
      <p>¿Descargar CV?</p>
      <div class="cv-modal-actions">
        <button class="btn-cancel" id="cv-cancel">Cancelar</button>
        <button class="btn-confirm" id="cv-confirm">Descargar</button>
      </div>
    </div>
  </div>

  <script>
    var cvLink     = document.getElementById('cv-link');
    var backdrop   = document.getElementById('cv-backdrop');
    var btnConfirm = document.getElementById('cv-confirm');
    var btnCancel  = document.getElementById('cv-cancel');

    cvLink.addEventListener('click', function(e) {
      e.preventDefault();
      backdrop.classList.add('open');
    });
    btnCancel.addEventListener('click', function() {
      backdrop.classList.remove('open');
    });
    btnConfirm.addEventListener('click', function() {
      backdrop.classList.remove('open');
      var a = document.createElement('a');
      a.href = cvLink.href;
      a.download = 'Trinidad-Marti-CV.pdf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });
    backdrop.addEventListener('click', function(e) {
      if (e.target === backdrop) backdrop.classList.remove('open');
    });
  </script>
</body>
</html>
