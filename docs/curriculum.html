<body>
  <div class="page-wrap">
    <nav class="nav">
      <a href="index.html" class="nav-logo">TRINIDAD MARTÍ — Backend Dev</a>
      <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="static/cv.pdf" id="cv-link">CV</a></li>
        <li><a href="about.html">About me</a></li>
      </ul>
    </nav>
    

<div class="curriculum-page">
  <h1>OSSU CS Curriculum</h1>
  <span class="label page-meta">Self-study · 0% complete · 0/1 courses</span>

  
  <section class="curriculum-category">
    <h2>Core programming</h2>
    
    <div class="curriculum-course">
      <div>
        <div class="course-title">
          <a href="https://cs.ossu.dev/coursepages/spd/" target="_blank" rel="noopener">Systematic Program Design Pt.1</a>
        </div>
        <div class="progress-bar" style="margin-top: 5px;">
          <div class="progress-bar-fill" style="width: 0%"></div>
        </div>
        <div class="post-count">0 posts</div>
      </div>
      <div class="status-badge in-progress">
        IN PROGRESS
      </div>
    </div>
    
  </section>
  
</div>

  </div>

  <div class="cv-modal-backdrop" id="cv-backdrop">
    <div class="cv-modal">
      <p>¿Descargar CV?</p>
      <div class="cv-modal-actions">
        <button class="btn-cancel" id="cv-cancel">Cancelar</button>
        <button class="btn-confirm" id="cv-confirm">Descargar</button>
      </div>
    </div>
  </div>

  <script>
    var cvLink     = document.getElementById('cv-link');
    var backdrop   = document.getElementById('cv-backdrop');
    var btnConfirm = document.getElementById('cv-confirm');
    var btnCancel  = document.getElementById('cv-cancel');

    cvLink.addEventListener('click', function(e) {
      e.preventDefault();
      backdrop.classList.add('open');
    });
    btnCancel.addEventListener('click', function() {
      backdrop.classList.remove('open');
    });
    btnConfirm.addEventListener('click', function() {
      backdrop.classList.remove('open');
      var a = document.createElement('a');
      a.href = cvLink.href;
      a.download = 'Trinidad-Marti-CV.pdf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });
    backdrop.addEventListener('click', function(e) {
      if (e.target === backdrop) backdrop.classList.remove('open');
    });
  </script>
</body>
</html>
